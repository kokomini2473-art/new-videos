<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>videos</title>
  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: sans-serif;
      text-align: center;
    }

    h2 {
      margin: 20px 0;
    }

    .container {
      position: relative;
      width: 90%;
      max-width: 600px;
      margin: auto;
    }

    .container img {
      width: 100%;
      display: block;
      border-radius: 15px;
    }

    /* 黒い部分だけクリック可能にする */
    .click-area {
      position: absolute;
      top: 35%;
      left: 5%;
      width: 90%;
      height: 30%;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>videos for you</h2>

  <div class="container">
    <img src="your-image.jpg" alt="video">

    <!-- 中央クリックエリア -->
    <a href="https://lite.tiktok.com/t/ZS98xge6aSUnF-ATdSw/" class="click-area"></a>
  </div>

</body>
</html>
